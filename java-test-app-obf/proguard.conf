# ProGuard Configuration for Java Vulnerability Lab - Obfuscated
# Target: Obfuscate vulnerability code while maintaining functionality
# Note: Input/Output are configured in pom.xml

# Keep Spring Boot application entry point
-keep public class com.vulnobf.ObfApplication {
    public static void main(java.lang.String[]);
}

# Keep Spring Boot loader classes
-keep class org.springframework.boot.loader.** { *; }

# Keep Spring components (required for dependency injection)
-keep @org.springframework.stereotype.** class * {
    @org.springframework.beans.factory.annotation.** *;
    public <methods>;
    public <fields>;
}

-keep @org.springframework.web.bind.annotation.** class * {
    @org.springframework.web.bind.annotation.** *;
    public <methods>;
}

# Keep REST controller methods (but can obfuscate internals)
-keep @org.springframework.web.bind.annotation.RestController class * {
    @org.springframework.web.bind.annotation.** public <methods>;
}

# Keep required attributes for Spring and annotations
-keepattributes Signature,Exceptions,*Annotation*,InnerClasses,EnclosingMethod,MethodParameters

# Keep enum values
-keepclassmembers enum * {
    public static **[] values();
    public static ** valueOf(java.lang.String);
}

# Obfuscation Settings
-dontoptimize
-dontshrink
-allowaccessmodification

# String obfuscation
-adaptclassstrings

# Don't warn about missing classes
-ignorewarnings
-dontnote **

# Keep native methods
-keepclasseswithmembernames class * {
    native <methods>;
}

# Keep serialization
-keepclassmembers class * implements java.io.Serializable {
    static final long serialVersionUID;
    private static final java.io.ObjectStreamField[] serialPersistentFields;
    private void writeObject(java.io.ObjectOutputStream);
    private void readObject(java.io.ObjectInputStream);
    java.lang.Object writeReplace();
    java.lang.Object readResolve();
}

# Mapping file for debugging
-printmapping target/proguard-mapping.txt

# Keep source file name (optional, set to false for more obfuscation)
-keepattributes SourceFile,LineNumberTable

# Renaming scheme
-repackageclasses ''
-allowaccessmodification
