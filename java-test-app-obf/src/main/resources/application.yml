# Web Application Platform Configuration
server:
  port: 8081

spring:
  application:
    name: web-platform-core

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true

  sql:
    init:
      mode: never

logging:
  level:
    root: INFO
    com.webapp.core: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
